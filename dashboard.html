<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      padding: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      border: 1px solid #333;
      padding: 10px;
      text-align: left;
    }

    button {
      padding: 5px 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>📦 Orders Dashboard</h1>

<table id="ordersTable">
  <thead>
    <tr>
      <th>ID</th>
      <th>Product</th>
      <th>Price</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
async function loadOrders() {
  const res = await fetch("http://localhost:3000/admin/orders");
  const orders = await res.json();

  const table = document.querySelector("#ordersTable tbody");
  table.innerHTML = "";

  orders.forEach(order => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${order.id}</td>
      <td>${order.product_name}</td>
      <td>$${order.price}</td>
      <td>${order.status}</td>
      <td>
        <button onclick="updateOrder(${order.id}, 'shipped')">Ship</button>
        <button onclick="updateOrder(${order.id}, 'delivered')">Deliver</button>
      </td>
    `;

    table.appendChild(row);
  });
}

async function updateOrder(id, status) {
  await fetch("http://localhost:3000/admin/update", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ id, status })
  });

  loadOrders();
}

// auto refresh
setInterval(loadOrders, 3000);
loadOrders();
</script>

</body>
</html>
